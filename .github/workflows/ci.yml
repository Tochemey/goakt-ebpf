name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: false
          cache-dependency-path: "**/*.sum"

      - name: Build
        run: go build -v ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: false
          cache-dependency-path: "**/*.sum"

      - name: Test
        run: go test -v -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  generate:
    name: BPF Generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: false
          cache-dependency-path: "**/*.sum"

      - name: Install BPF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm linux-headers-generic

      - name: Generate BPF
        env:
          BPF2GO_CFLAGS: "-I${{ github.workspace }}/internal/include/libbpf -I${{ github.workspace }}/internal/include"
          GOFLAGS: "-mod=mod"
        run: go generate ./internal/instrumentation/bpf/github.com/tochemey/goakt/actor/...

      - name: Verify generated files
        run: |
          test -f internal/instrumentation/bpf/github.com/tochemey/goakt/actor/bpf_x86_bpfel.o
          test -f internal/instrumentation/bpf/github.com/tochemey/goakt/actor/bpf_arm64_bpfel.o

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: goakt-ebpf:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
