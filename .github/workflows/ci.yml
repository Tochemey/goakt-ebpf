name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # "build" is true if any of these paths changed
          filters: |
            build:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - '.github/workflows/ci.yml'

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: false
          cache-dependency-path: "**/*.sum"

      - name: Build
        run: go build -v ./...

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: false
          cache-dependency-path: "**/*.sum"

      - name: Test
        run: go test -v -race -count=1 ./...

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: false
          cache-dependency-path: "**/*.sum"

      - name: Run Linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          args: --timeout 10m --config .golangci.yml

  generate:
    name: BPF Generate
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: false
          cache-dependency-path: "**/*.sum"

      - name: Install BPF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm linux-headers-generic

      - name: Generate BPF
        env:
          BPF2GO_CFLAGS: "-I${{ github.workspace }}/internal/include/libbpf -I${{ github.workspace }}/internal/include"
          GOFLAGS: "-mod=mod"
        run: go generate ./internal/instrumentation/bpf/github.com/tochemey/goakt/actor/...

      - name: Verify generated files
        run: |
          test -f internal/instrumentation/bpf/github.com/tochemey/goakt/actor/bpf_x86_bpfel.o
          test -f internal/instrumentation/bpf/github.com/tochemey/goakt/actor/bpf_arm64_bpfel.o

  docker:
    name: Docker Build
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: goakt-ebpf:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
