name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            build:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '**/Dockerfile*'
              - 'examples/**'
              - '.golangci.yml'
              - '.github/workflows/ci.yml'
              - '**/docker-compose*.yml'

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: false
          cache-dependency-path: "**/*.sum"

      - name: Build
        run: go build -v ./...

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: false
          cache-dependency-path: "**/*.sum"

      - name: Test
        run: go test -v -race -count=1 ./...

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: false
          cache-dependency-path: "**/*.sum"

      - name: Run Linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          args: --timeout 10m --config .golangci.yml

  generate:
    name: BPF Generate
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: false
          cache-dependency-path: "**/*.sum"

      - name: Install BPF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm linux-headers-generic

      - name: Generate BPF
        env:
          BPF2GO_CFLAGS: "-I${{ github.workspace }}/internal/include/libbpf -I${{ github.workspace }}/internal/include"
          GOFLAGS: "-mod=mod"
        run: go generate ./internal/instrumentation/bpf/github.com/tochemey/goakt/actor/...

      - name: Verify generated files
        run: |
          test -f internal/instrumentation/bpf/github.com/tochemey/goakt/actor/bpf_x86_bpfel.o
          test -f internal/instrumentation/bpf/github.com/tochemey/goakt/actor/bpf_arm64_bpfel.o

  docker:
    name: Docker Build
    needs: changes
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: goakt-ebpf:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    name: Integration
    needs: [changes, docker]
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-24.04  # Better eBPF kernel support; see keploy.io/blog/community/executing-ebpf-in-github-actions
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start integration stack
        run: |
          docker compose -f examples/integration/docker-compose.yml -f examples/integration/docker-compose.ci.yml up --build -d
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1

      - name: Wait for agent and traces
        run: sleep 30

      - name: Verify agent attached
        run: |
          LOGS=$(docker compose -f examples/integration/docker-compose.yml -f examples/integration/docker-compose.ci.yml logs goakt-ebpf 2>&1)
          if echo "$LOGS" | grep -q "operation not permitted"; then
            echo "::error::Agent failed to attach (eBPF not supported on this runner)"
            echo "$LOGS"
            exit 1
          else
            echo "Agent attached successfully"
          fi

      - name: Verify traces in Jaeger
        run: |
          TRACES=$(curl -sf "http://localhost:16686/api/traces?service=goakt-ebpf&limit=1" 2>/dev/null || echo "{}")
          if echo "$TRACES" | grep -qE '"data":\s*\[[^]]+'; then
            echo "Traces found in Jaeger - integration OK"
          else
            echo "::error::No traces in Jaeger - pipeline or agent may be broken"
            echo "Response: $TRACES"
            echo ""
            echo "=== goakt-ebpf agent logs ==="
            docker compose -f examples/integration/docker-compose.yml -f examples/integration/docker-compose.ci.yml logs goakt-ebpf 2>&1
            echo ""
            echo "=== otel-collector logs ==="
            docker compose -f examples/integration/docker-compose.yml -f examples/integration/docker-compose.ci.yml logs otel-collector 2>&1 | tail -30
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker compose -f examples/integration/docker-compose.yml -f examples/integration/docker-compose.ci.yml down -v
